name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_CHARACTER_SET_SERVER: utf8mb4
          MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # caching pip saves 2-3 minutes on every run
      # because pip does not re-download packages
      # that were already downloaded in a previous run
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/*.txt') }}

      - name: Install bench
        run: pip install frappe-bench

      - name: Init bench
        run: |
          bench init frappe-bench \
            --frappe-branch version-15 \
            --skip-assets \
            --python python3

      - name: Create site
        run: |
          cd frappe-bench
          bench new-site test.localhost \
            --mariadb-root-password root \
            --admin-password admin \
            --db-name test_quickfix \
            --no-mariadb-socket

      - name: Checkout quickfix app
        uses: actions/checkout@v4
        with:
          path: frappe-bench/apps/quickfix

      - name: Install quickfix app
        run: |
          cd frappe-bench
          bench --site test.localhost install-app quickfix --skip-assets

      - name: Enable developer mode
        run: |
          cd frappe-bench
          bench --site test.localhost set-config developer_mode 1

      - name: Load test fixtures
        run: |
          cd frappe-bench
          bench --site test.localhost execute \
            quickfix.tests.setup_test_data.load_test_fixtures

      - name: Run tests
        run: |
          cd frappe-bench
          bench --site test.localhost run-tests \
            --app quickfix \
            --verbose