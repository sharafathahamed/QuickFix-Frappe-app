name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-22.04
    env:
      CI: "Yes"
      FRAPPE_REDIS_CACHE: redis://127.0.0.1:6379
      FRAPPE_REDIS_QUEUE: redis://127.0.0.1:6379
      FRAPPE_REDIS_SOCKETIO: redis://127.0.0.1:6379

    services:
      mariadb:
        image: mariadb:10.6
        env:
          MARIADB_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # caching pip saves 2-3 minutes on every run
      # because pip does not re-download packages
      # that were already downloaded in a previous run
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('**/*.txt') }}

      - name: Install bench
        run: pip install frappe-bench

      - name: Init bench
        run: |
          bench init frappe-bench \
            --frappe-branch version-15 \
            --skip-redis-config-generation \
            --skip-assets \
            --python python3

      - name: Configure bench services
        run: |
          cd frappe-bench
          bench set-config -g redis_cache "$FRAPPE_REDIS_CACHE"
          bench set-config -g redis_queue "$FRAPPE_REDIS_QUEUE"
          bench set-config -g redis_socketio "$FRAPPE_REDIS_SOCKETIO"

      - name: Create site
        run: |
          cd frappe-bench
          bench new-site test.localhost \
            --db-host 127.0.0.1 \
            --db-port 3306 \
            --db-root-username root \
            --mariadb-root-password root \
            --admin-password admin \
            --db-name test_quickfix \
            --no-mariadb-socket

      - name: Checkout quickfix app
        uses: actions/checkout@v4
        with:
          path: frappe-bench/apps/quickfix

      - name: Install quickfix app
        run: |
          cd frappe-bench
          bench --site test.localhost install-app quickfix

      - name: Enable developer mode
        run: |
          cd frappe-bench
          bench --site test.localhost set-config developer_mode 1
          bench --site test.localhost set-config allow_tests true

      - name: Load test fixtures
        run: |
          cd frappe-bench
          bench --site test.localhost execute \
            quickfix.tests.setup_test_data.load_test_fixtures

      - name: Run tests
        run: |
          cd frappe-bench
          bench --site test.localhost run-tests \
            --app quickfix \
            --verbose
